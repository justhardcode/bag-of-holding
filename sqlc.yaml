version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/features/**/*.queries.sql"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
