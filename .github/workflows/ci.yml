name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true
          cache-dependency-path: go.sum
      
      - name: Setup sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'
      
      - name: Verify sqlc output
        run: sqlc diff
      
      - name: Build binary
        run: go build ./...
      
      - name: Runs tests
        run: go test ./...